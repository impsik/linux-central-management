name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install npm deps
        run: npm ci
      - name: Run frontend tests
        run: npm run test:frontend
      - name: Lint status colors (no legacy inline hex in templates)
        run: |
          set -euo pipefail
          echo "Checking commit: $(git rev-parse --short HEAD)"
          forbidden='(#86efac|#fca5a5|#fbbf24|#94a3b8|#a0aec0|#cbd5e1)'
          # Only check tracked template sources used by the UI runtime.
          matches=$(mktemp)
          if git ls-files -z 'server/app/templates/*.js' 'server/app/templates/index.html' \
            | xargs -0 grep -nE "$forbidden" > "$matches"; then
            cat "$matches"
            echo "❌ Found legacy status hex colors in templates. Use semantic classes or CSS vars instead."
            exit 1
          fi
          echo "✅ Status color lint passed"

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt
      - name: Install npm deps
        run: npm ci
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt uvicorn
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Start app for smoke test
        env:
          DATABASE_URL: sqlite+pysqlite:///./ci-smoke.db
          DB_AUTO_CREATE_TABLES: "true"
          DB_REQUIRE_MIGRATIONS_UP_TO_DATE: "false"
          AGENT_SHARED_TOKEN: ci-token
          ALLOW_INSECURE_NO_AGENT_TOKEN: "true"
          BOOTSTRAP_PASSWORD: ci-admin-password
          MFA_REQUIRE_FOR_PRIVILEGED: "false"
          UI_COOKIE_SECURE: "false"
          UI_REVOKE_ALL_SESSIONS_ON_STARTUP: "false"
        run: |
          python3 -m uvicorn app.main:app --app-dir server --host 127.0.0.1 --port 8000 > /tmp/fleet-ci-server.log 2>&1 &
          echo $! > /tmp/fleet-ci-server.pid
      - name: Wait for app health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to become healthy"
          cat /tmp/fleet-ci-server.log || true
          exit 1
      - name: Run Playwright smoke tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000
          PLAYWRIGHT_USERNAME: admin
          PLAYWRIGHT_PASSWORD: ci-admin-password
        run: npm run test:e2e:smoke
      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/fleet-ci-server.log || true
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt pytest
      - name: Run backend smoke tests (fail fast)
        env:
          AGENT_SHARED_TOKEN: ci-token
          ALLOW_INSECURE_NO_AGENT_TOKEN: "true"
          DB_AUTO_CREATE_TABLES: "false"
          DB_REQUIRE_MIGRATIONS_UP_TO_DATE: "false"
        run: pytest server/tests/test_overview_reliability_smoke.py -q
      - name: Run full backend tests
        env:
          AGENT_SHARED_TOKEN: ci-token
          ALLOW_INSECURE_NO_AGENT_TOKEN: "true"
          DB_AUTO_CREATE_TABLES: "false"
          DB_REQUIRE_MIGRATIONS_UP_TO_DATE: "false"
        run: pytest server/tests -q
