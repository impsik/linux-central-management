name: Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (full history for secret scanning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: false

      - name: Install security tooling
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install semgrep pip-audit
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Secret scan (full git history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST scan (Semgrep)
        run: semgrep --config auto .

      - name: Python dependency vulnerabilities
        run: pip-audit -r server/requirements.txt

      - name: Node dependency vulnerabilities (prod deps)
        run: npm audit --omit=dev

      - name: Go vulnerability check
        working-directory: agent
        run: govulncheck ./...

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          version: latest
          cache: false
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Trivy config scan (IaC)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          version: latest
          cache: false
          scan-type: config
          scan-ref: deploy
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
