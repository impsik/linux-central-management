<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fleet UI Login</title>
  <script src="/assets/fleet-theme-bootstrap.js?v=__ASSET_VERSION__"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --border: #d9e3f0;
      --text: #0f172a;
      --muted: #475569;
      --primary: #2563eb;
      --primary-2: #1e40af;
      --focus-ring: rgba(37, 99, 235, 0.25);
      --oidc-bg: #0f766e;
    }
    :root[data-theme="dark"] {
      --bg: #050a13;
      --panel: #0f172a;
      --panel-2: #111827;
      --border: #173044;
      --text: #e5e7eb;
      --muted: #a3a3a3;
      --primary: #2563eb;
      --primary-2: #1e3a8a;
      --focus-ring: rgba(59, 130, 246, 0.25);
      --oidc-bg: #0f766e;
    }
    /* Prevent 100% width inputs from overflowing due to padding/borders */
    *, *::before, *::after { box-sizing: border-box; }

    body { font-family:"Inter", "IBM Plex Sans", "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:var(--bg); margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--text); }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:3px; padding:1.25rem; width:380px; max-width:92vw; box-shadow:none; }
    .card-head { display:flex; align-items:center; justify-content:space-between; gap:0.75rem; }
    .theme-btn { width:auto; min-height:2rem; margin-top:0; border:1px solid var(--border); background:var(--panel); color:var(--text); border-radius:3px; padding:0.375rem 0.75rem; cursor:pointer; font-weight:400; }
    h1 { font-size:1.25rem; line-height:1.2; margin:0 0 1rem 0; font-weight:600; }
    label { display:block; font-size:0.875rem; color:var(--muted); margin-top:0.75rem; }
    input { width:100%; min-height:2rem; padding:0.375rem 0.5rem; border:1px solid var(--border); border-radius:3px; font-size:0.875rem; outline:none; background:var(--panel); color:var(--text); }
    input:focus { outline:2px solid var(--focus-ring); outline-offset:1px; box-shadow:none; }
    button { margin-top:1rem; width:100%; min-height:2rem; padding:0.375rem 0.75rem; border:1px solid var(--primary); border-radius:3px; background:var(--primary); color:white; font-size:0.875rem; font-weight:400; cursor:pointer; }
    button:hover { background:var(--primary-2); border-color:var(--primary-2); }
    .btn-ad { background:#1d4ed8; }
    .btn-ad:hover { background:#1e40af; border-color:#1e40af; }
    .btn-oidc { background: var(--oidc-bg); }
    .btn-oidc:hover { background:color-mix(in srgb, var(--oidc-bg) 82%, #000); border-color:color-mix(in srgb, var(--oidc-bg) 82%, #000); }
    .theme-btn:hover { border-color:color-mix(in srgb, var(--border) 50%, var(--text)); background:var(--panel-2); }
    button:disabled { opacity:0.6; cursor:not-allowed; }
    .link-btn { width:auto; min-height:0; margin:0.85rem auto 0; padding:0; border:0; background:transparent; color:var(--primary); text-decoration:underline; display:block; }
    .link-btn:hover { background:transparent; border:0; color:var(--primary-2); }
    .divider { display:flex; align-items:center; gap:0.65rem; color:var(--muted); font-size:0.8rem; margin:1rem 0 0.25rem; }
    .divider::before, .divider::after { content:""; height:1px; background:var(--border); flex:1; }
    .login-mode { margin-top:0.25rem; color:var(--muted); font-size:0.85rem; }
    .local-login { display:none; }
    .err { display:none; }
    .hint { margin-top:0.75rem; color:var(--muted); font-size:0.8rem; }
    .caps-hint { margin-top:0.5rem; color:#b45309; font-size:0.8rem; display:none; }
    .toast-container { position:fixed; right:1.5rem; bottom:1.5rem; display:flex; flex-direction:column; gap:0.75rem; z-index:2000; pointer-events:none; }
    .toast { background:var(--panel); color:var(--text); border:1px solid var(--border); padding:0.7rem 0.95rem; border-radius:3px; min-width:200px; max-width:320px; box-shadow:none; opacity:0; transform:translateY(8px); transition:opacity 0.2s ease, transform 0.2s ease; }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast-success { border-color: rgba(16, 185, 129, 0.5); }
    .toast-error { border-color: rgba(239, 68, 68, 0.6); }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-head">
      <h1>Sign in</h1>
      <button class="theme-btn" id="theme-btn" type="button">Theme</button>
    </div>
    <div class="login-mode" id="login-mode">Active Directory</div>
    <label for="u">Username</label>
    <input id="u" autocomplete="username" />
    <label for="p">Password</label>
    <input id="p" type="password" autocomplete="current-password" />
    <div class="caps-hint" id="caps-hint">Caps Lock is on.</div>
    <button id="btn" class="btn-ad">Sign in with Active Directory</button>
    <button id="local-link" class="link-btn" type="button" style="display:none;">Use a Local User</button>
    <div class="local-login" id="local-actions">
      <div class="divider">Local user</div>
      <button id="local-btn" type="button">Login</button>
    </div>
    <button id="btn-oidc" class="btn-oidc" style="display:none;">Sign in with SSO</button>
    <div class="err" id="err"></div>
    <div class="hint">Your session is stored in a secure cookie (HttpOnly). Passwords are stored hashed in DB.</div>
  </div>
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
  <script nonce="__CSP_NONCE__">
    const themeBtn = document.getElementById('theme-btn');
    function getTheme() { return document.documentElement.dataset.theme || 'dark'; }
    function setTheme(t) { document.documentElement.dataset.theme = t; try { localStorage.setItem('fleet_theme', t); } catch {} }
    themeBtn?.addEventListener('click', () => setTheme(getTheme() === 'dark' ? 'light' : 'dark'));

    const u = document.getElementById('u');
    const p = document.getElementById('p');
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    const capsHint = document.getElementById('caps-hint');
    const oidcBtn = document.getElementById('btn-oidc');
    const localLink = document.getElementById('local-link');
    const localActions = document.getElementById('local-actions');
    const localBtn = document.getElementById('local-btn');
    const loginMode = document.getElementById('login-mode');
    let adEnabled = false;
    let useLocalLogin = true;
    if (btn) btn.disabled = true;

    setTimeout(() => { u?.focus(); }, 0);

    const updateCapsHint = (event) => {
      if (!capsHint) return;
      const caps = event && event.getModifierState ? event.getModifierState('CapsLock') : false;
      capsHint.style.display = caps ? 'block' : 'none';
    };
    p?.addEventListener('keydown', updateCapsHint);
    p?.addEventListener('keyup', updateCapsHint);
    p?.addEventListener('blur', () => { if (capsHint) capsHint.style.display = 'none'; });

    function showToast(message, type = 'info', timeoutMs = 3000) {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      const remove = () => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 200);
      };
      setTimeout(remove, timeoutMs);
    }

    async function initOidcButton() {
      try {
        const r = await fetch('/auth/admin-info', { cache: 'no-store', credentials: 'same-origin' });
        if (!r.ok) throw new Error('admin info unavailable');
        const d = await r.json();
        adEnabled = !!(d && d.ad_enabled);
        if (adEnabled) {
          useLocalLogin = false;
          btn.textContent = 'Sign in with Active Directory';
          btn.classList.add('btn-ad');
          if (localLink) localLink.style.display = 'block';
          if (loginMode) loginMode.textContent = 'Active Directory';
        } else {
          useLocalLogin = true;
          btn.textContent = 'Login';
          btn.classList.remove('btn-ad');
          if (loginMode) loginMode.textContent = 'Local user';
        }
        if (d && d.oidc_enabled && oidcBtn) {
          oidcBtn.style.display = 'block';
          oidcBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '/auth/oidc/login';
          });
        }
      } catch {
        useLocalLogin = true;
        btn.textContent = 'Login';
        btn.classList.remove('btn-ad');
        if (loginMode) loginMode.textContent = 'Local user';
      } finally {
        btn.disabled = false;
      }
    }

    function showLocalLogin() {
      useLocalLogin = true;
      btn.style.display = 'none';
      if (localLink) localLink.style.display = 'none';
      if (localActions) localActions.style.display = 'block';
      if (loginMode) loginMode.textContent = 'Local user';
      u?.focus();
    }

    async function login() {
      err.textContent = '';
      btn.disabled = true;
      if (localBtn) localBtn.disabled = true;
      try {
        const endpoint = useLocalLogin ? '/auth/login' : '/auth/ad/login';
        const resp = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u.value || '', password: p.value || '' })
        });
        if (!resp.ok) {
          let msg = resp.statusText;
          try { const j = await resp.json(); msg = j.detail || j.message || msg; } catch {}
          throw new Error(msg);
        }
        let data = null;
        try { data = await resp.json(); } catch { data = null; }
        const mfaPending = !!(data && (data.mfa_required || data.mfa_setup_required));
        if (mfaPending) {
          showToast('Signed in. MFA required—complete setup/verification.', 'info', 3500);
        } else {
          showToast('Signed in.', 'success');
        }
        const nextUrl = (mfaPending && data && data.mfa_redirect) ? data.mfa_redirect : '/';
        setTimeout(() => { window.location.href = nextUrl; }, 400);
      } catch (e) {
        const msg = e.message || String(e);
        showToast(msg, 'error');
      } finally {
        btn.disabled = false;
        if (localBtn) localBtn.disabled = false;
      }
    }
    btn.addEventListener('click', (e) => { e.preventDefault(); login(); });
    localBtn?.addEventListener('click', (e) => { e.preventDefault(); login(); });
    localLink?.addEventListener('click', (e) => { e.preventDefault(); showLocalLogin(); });
    p.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
    initOidcButton();
  </script>
</body>
</html>
